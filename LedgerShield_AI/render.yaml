services:
  - type: web
    name: ledgershield-ai-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    autoDeploy: true
    envVars:
      - key: CORS_ORIGINS
        value: https://ledgershield-ai.onrender.com

  - type: web
    name: ledgershield-ai
    env: node
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm start
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NEXT_PUBLIC_API_URL
        value: https://ledgershield-ai-backend.onrender.com
